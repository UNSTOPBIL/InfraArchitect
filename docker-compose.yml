version: '3.9'
services:
  gateway:
    image: kong:3.4
    ports: [ "8000:8000" ]
    depends_on: [ ledger-api, vault-auth ]

  ledger-api:
    image: golang:1.21-alpine
    depends_on: [ db, redis ]
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/ledger

  vault-auth:
    image: hashicorp/vault:1.14
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=unstopbil_vault_token

  db:
    image: postgres:15-alpine
    volumes: [ "ledger_data:/var/lib/postgresql/data" ]

  redis:
    image: redis:7-alpine

volumes:
  ledger_data: