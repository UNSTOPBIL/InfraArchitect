version: '3.9'
services:
  event-bus:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672" # Message broker
      - "15672:15672" # Management UI

  payment-service:
    image: python:3.11-slim
    environment:
      - BROKER_URL=amqp://guest:guest@event-bus:5672
    depends_on:
      - event-bus

  notification-worker:
    image: node:20-alpine
    command: ["npm", "start"]
    depends_on:
      - event-bus
      - email-mock

  email-mock:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Dashboard

  inventory-db:
    image: mariadb:10.11
    environment:
      - MARIADB_ROOT_PASSWORD=unstopbil_secure_pass
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: