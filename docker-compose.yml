version: '3.9'
services:
  api-gateway:
    image: traefik:v2.10
    ports:
      - "80:80"
      - "8080:8080" # Dashboard
    command: --api.insecure=true --providers.docker

  auth-service:
    image: node:20-alpine
    environment:
      - JWT_SECRET=supersecret_hacker_key
    depends_on:
      - redis-cache

  order-db:
    image: mongo:6.0
    volumes:
      - mongo_data:/data/db

  redis-cache:
    image: redis:7.2-alpine
    command: redis-server --save 60 1 --loglevel warning

  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  mongo_data: