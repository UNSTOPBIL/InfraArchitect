version: '3.9'
services:
  edge-cache:
    image: varnish:latest
    ports:
      - "80:80"
    volumes:
      - ./default.vcl:/etc/varnish/default.vcl
    depends_on:
      - web-origin

  web-origin:
    image: nginx:alpine
    depends_on:
      - session-store

  session-store:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]

  log-analyzer:
    image: alpine
    command: ["sh", "-c", "tail -f /var/log/nginx/access.log"]
    depends_on:
      - web-origin