version: '3.9'
services:
  spark-master:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=master
    ports:
      - "8081:8081" # Web UI

  spark-worker:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      - spark-master

  delta-lake:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=unstopbil_data_pass
    volumes:
      - lake_data:/data
    command: server /data

  metastore-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=metastore
      - POSTGRES_PASSWORD=metastore_secret
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  lake_data:
  db_data: