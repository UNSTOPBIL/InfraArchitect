version: '3.9'
services:
  ids-suricata:
    image: jasonish/suricata:latest
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    volumes:
      - ./suricata-logs:/var/log/suricata

  siem-wazuh:
    image: wazuh/wazuh-odfe:4.3.10
    ports:
      - "1514:1514/udp" # Agent communication
      - "55000:55000"   # API
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
    depends_on:
      - wazuh-indexer

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.3.10
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - wazuh_data:/var/lib/wazuh-indexer

  honeypot-trap:
    image: cowrie/cowrie:latest
    ports:
      - "2222:2222" # Fake SSH to trap attackers
    volumes:
      - ./honey-logs:/home/cowrie/cowrie-git/var/log/cowrie

volumes:
  wazuh_data: