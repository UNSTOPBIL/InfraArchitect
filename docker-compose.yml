version: '3.9'
services:
  nginx-proxy:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    depends_on:
      - app-v1
  app-v1:
    image: node:18-slim
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/infra_db
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d infra_db"]
      interval: 10s

volumes:
  postgres_data: