version: '3.9'
services:
  reverse-proxy:
    image: nginx:alpine
    ports: ["80:80"]
    depends_on: [backend-api]
  backend-api:
    image: python:3.11-slim
    depends_on: [postgres-db, redis-cache]
  postgres-db:
    image: postgres:15
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis-cache:
    image: redis:7
volumes:
  pgdata: