version: '3.9'
services:
  api-gateway:
    image: kong:latest
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      - KONG_DATABASE=off
    depends_on:
      - payment-service

  payment-service:
    image: node:20-alpine
    environment:
      - SERVICE_NAME=payments
      - CONSUL_HTTP_ADDR=consul:8500
    depends_on:
      - consul

  cassandra-node:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

  consul:
    image: hashicorp/consul:1.15
    ports:
      - "8500:8500"
    command: "agent -dev -client 0.0.0.0"

  elk-stack:
    image: sebp/elk:latest
    ports:
      - "5601:5601" # Kibana
      - "9200:9200" # Elasticsearch

volumes:
  cassandra_data: