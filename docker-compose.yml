version: '3.9'
services:
  ethereum-node:
    image: ethereum/client-go:stable
    ports:
      - "30303:30303"     # P2P Discovery
      - "8545:8545"       # RPC API
    volumes:
      - eth_data:/root/.ethereum

  graph-indexer:
    image: graphprotocol/graph-node:latest
    environment:
      - postgres_host=db
      - ethereum_node=mainnet:http://ethereum-node:8545
    depends_on:
      - db
      - ethereum-node

  ipfs-gateway:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"       # P2P Swarm
      - "8080:8080"       # Gateway
    volumes:
      - ipfs_data:/data/ipfs

  db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_PASSWORD=unstopbil_web3_secret
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  eth_data:
  ipfs_data:
  pg_data: