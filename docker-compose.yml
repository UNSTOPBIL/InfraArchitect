version: '3.9'
services:
  game-server:
    image: ghcr.io/linuxserver/steamcmd:latest
    ports:
      - "27015:27015/udp" # Game traffic
      - "27015:27015/tcp" # Query traffic
    environment:
      - APP_ID=440 # Team Fortress 2
    depends_on:
      - matchmaker-api

  matchmaker-api:
    image: node:20-alpine
    environment:
      - INFLUXDB_URL=http://metrics:8086
    depends_on:
      - metrics

  metrics:
    image: influxdb:2.7-alpine
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_PASSWORD=unstopbil_metrics_pass
    volumes:
      - influx_data:/var/lib/influxdb2

  visualizer:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - metrics

volumes:
  influx_data: